<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useCallback, useEffect, useRef } = React;

const RESTAURANT_NAME = 'Bar São Paulo';
const RESTAURANT_TAGLINE = 'Restaurante & Chopperia';
const BADGE_TEXT = 'Reserva grátis · Confirmação no WhatsApp';
const INFO_BANNER_TEXT = 'Chegue em até 15 minutos do horário reservado. Depois desse prazo, a mesa pode ser repassada a outros clientes.';
const CAPACITY_PER_SLOT = 28;
const LUNCH_SLOTS = ['11:00','11:30','12:00','12:30','13:00','13:30','14:00','14:30','15:00'];
// Dinner slots vary by day - see getDinnerSlots()
function getDinnerSlots(date) {
  if (!date) return [];
  const dow = date.getDay(); // 0=Sun,1=Mon,...,6=Sat
  if (dow === 0) return []; // Sunday: closed at night
  if (dow >= 5) return ['17:30','18:00','18:30','19:00']; // Fri & Sat
  return ['17:30','18:00','18:30','19:00','19:30','20:00','20:30','21:00']; // Mon-Thu
}
const DAYS_AHEAD = 14;
const RESTAURANT_PHONE = '15997638245';
const BANNER_URL = 'https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Ponte_estaiada_Oct_2008_RC.jpg/1280px-Ponte_estaiada_Oct_2008_RC.jpg';
const LOGO_DATA_URI = document.getElementById('_logo_data').src;

const SUPABASE_URL = 'https://azgojxotsjdfwoxquxdj.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_WN1srJPcZ_1CYaZL6JE2RA_YeBi5Vwc';

const C = {
  red: '#E2362B', redDark: '#C42A20', gold: '#F4B731',
  cream: '#FBF5EA', card: '#FFFFFF', border: '#EFE3D0',
  muted: '#9A9082', charcoal: '#2B2B2B', sage: '#5FA776',
  bannerBg: '#FFF8E7', bannerText: '#9A6B1E',
};

const WEEKDAYS_FULL = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
const WEEKDAYS_SHORT = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const MONTHS_FULL = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function formatLong(d) {
  return `${WEEKDAYS_FULL[d.getDay()]}, ${d.getDate()} de ${MONTHS_FULL[d.getMonth()]}`;
}
function generateCode() {
  return Math.random().toString(36).slice(2,8).toUpperCase();
}
function formatPhone(p) {
  const d = p.replace(/\D/g,'');
  if(d.length===11) return `(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7)}`;
  return p;
}
function buildWA(reservation, date) {
  const lines = [
    `Nova reserva — ${RESTAURANT_NAME}`,
    `Data: ${formatLong(date)}`,
    `Horário: ${reservation.time}`,
    `Pessoas: ${reservation.partySize}`,
    `Nome: ${reservation.name}`,
    `Telefone: ${reservation.phone}`,
  ];
  if(reservation.notes) lines.push(`Obs: ${reservation.notes}`);
  lines.push(`Código: #${reservation.id}`);
  const digits = RESTAURANT_PHONE.replace(/\D/g,'');
  return `https://wa.me/55${digits}?text=${encodeURIComponent(lines.join('\n'))}`;
}

const memStore = {};
async function loadAvailability(date) {
  const key = dateKey(date);
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_availability`, {
      method:'POST',
      headers:{ apikey: SUPABASE_ANON_KEY, 'Content-Type':'application/json' },
      body: JSON.stringify({ p_date: key }),
    });
    if(!res.ok) throw new Error();
    const rows = await res.json();
    return rows.map(r => ({ time: r.time, partySize: Number(r.booked) }));
  } catch(e) { return memStore[key] || []; }
}
async function saveReservation(date, reservation) {
  const key = dateKey(date);
  memStore[key] = [...(memStore[key]||[]), reservation];
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/reservations`, {
      method:'POST',
      headers:{ apikey: SUPABASE_ANON_KEY, 'Content-Type':'application/json', Prefer:'return=minimal' },
      body: JSON.stringify({
        id: reservation.id, date: key, time: reservation.time,
        party_size: reservation.partySize, name: reservation.name,
        phone: reservation.phone, email: reservation.email||null, notes: reservation.notes||null,
      }),
    });
  } catch(e) {}
}

// ── Dropdown accordion step ──────────────────────────────────────────────────
function Step({ number, icon, label, open, onToggle, disabled, children, valueLabel }) {
  return (
    <div className="border-b last:border-b-0" style={{ borderColor: C.border }}>
      <button
        onClick={() => !disabled && onToggle()}
        disabled={disabled}
        className="w-full flex items-center gap-3 px-5 py-4 text-left"
        style={{ opacity: disabled ? 0.4 : 1, cursor: disabled ? 'not-allowed' : 'pointer' }}
      >
        <span className="w-8 h-8 rounded-full flex items-center justify-center shrink-0 text-sm"
          style={{ backgroundColor: open ? C.red : '#F0EBE3', color: open ? '#fff' : C.muted }}>
          {icon}
        </span>
        <div className="flex-1 min-w-0">
          <p className="text-xs font-bold uppercase tracking-widest" style={{ color: C.muted }}>{label}</p>
          <p className="text-sm font-semibold truncate" style={{ color: valueLabel ? C.charcoal : C.muted }}>
            {valueLabel || 'Selecione'}
          </p>
        </div>
        <span style={{ color: C.muted }}>{open ? '∧' : '∨'}</span>
      </button>
      {open && (
        <div className="px-5 pb-4 fade-up">{children}</div>
      )}
    </div>
  );
}

function Ticket({ reservation, date, onReset }) {
  return (
    <div className="ticket-appear rounded-3xl overflow-hidden shadow-lg mx-auto max-w-sm"
      style={{ backgroundColor: C.card, border: `1px solid ${C.border}` }}>
      <div className="relative px-6 pt-6 pb-4 text-center">
        <div className="absolute top-4 right-4 rounded px-2 py-0.5 border-2 rotate-[-10deg]"
          style={{ borderColor: C.red, color: C.red }}>
          <span className="font-mono text-xs font-bold uppercase tracking-widest">Confirmado</span>
        </div>
        <img src={LOGO_DATA_URI} alt="logo" className="w-16 h-16 object-contain rounded-2xl mx-auto mb-2" />
        <p className="font-display text-xs font-bold uppercase tracking-widest" style={{ color: C.gold }}>Reserva confirmada</p>
        <h2 className="font-display text-2xl font-extrabold" style={{ color: C.red }}>{RESTAURANT_NAME}</h2>
      </div>
      <div className="relative h-4">
        <div className="absolute inset-x-5 top-1/2 border-t border-dashed" style={{ borderColor: C.border }} />
        <div className="absolute -left-2.5 top-0 w-5 h-5 rounded-full" style={{ backgroundColor: C.cream }} />
        <div className="absolute -right-2.5 top-0 w-5 h-5 rounded-full" style={{ backgroundColor: C.cream }} />
      </div>
      <div className="px-6 py-4 space-y-2.5">
        {[
          ['Data', formatLong(date)],
          ['Horário', reservation.time],
          ['Pessoas', `${reservation.partySize} ${reservation.partySize===1?'pessoa':'pessoas'}`],
          ['Nome', reservation.name],
          ...(reservation.notes ? [['Observações', reservation.notes]] : []),
        ].map(([k,v]) => (
          <div key={k} className="flex justify-between gap-3">
            <span className="text-xs font-bold uppercase tracking-wider" style={{ color: C.muted }}>{k}</span>
            <span className="text-sm font-semibold text-right" style={{ color: C.charcoal }}>{v}</span>
          </div>
        ))}
        <div className="flex justify-between items-center pt-3" style={{ borderTop: `1px solid ${C.border}` }}>
          <span className="text-xs font-bold uppercase tracking-wider" style={{ color: C.muted }}>Código</span>
          <span className="font-mono text-lg font-bold" style={{ color: C.red }}>#{reservation.id}</span>
        </div>
      </div>
      <div className="px-6 pb-6 space-y-2">
        <p className="text-center text-xs" style={{ color: C.muted }}>O WhatsApp do restaurante já abriu. Se não abriu, toque abaixo.</p>
        <a href={buildWA(reservation, date)} target="_blank" rel="noopener noreferrer"
          className="w-full block text-center rounded-full py-3 font-display text-sm font-bold uppercase tracking-wide"
          style={{ backgroundColor: C.sage, color:'#fff' }}>
          Abrir WhatsApp do restaurante
        </a>
        <button onClick={onReset}
          className="w-full rounded-full py-3 font-display text-sm font-bold uppercase tracking-wide"
          style={{ backgroundColor: '#F0EBE3', color: C.charcoal }}>
          Fazer outra reserva
        </button>
      </div>
    </div>
  );
}

// ── FAQ ──────────────────────────────────────────────────────────────────────
const FAQS = [
  ['A reserva tem algum custo?', 'Não. É grátis, você só paga o que consumir no restaurante.'],
  ['E se eu não puder ir?', `Sem problema. Chame a gente no WhatsApp ${formatPhone(RESTAURANT_PHONE)} que remarcamos ou cancelamos na hora.`],
  ['Posso reservar para quantas pessoas?', 'Até 10 pessoas pelo site. Para grupos maiores, fale diretamente conosco pelo WhatsApp.'],
  ['Até que horas consigo reservar?', 'Você pode reservar com antecedência de até 14 dias. Recomendamos reservar com pelo menos 1 hora de antecedência.'],
];

function FAQ() {
  const [open, setOpen] = useState(null);
  return (
    <div className="max-w-lg mx-auto px-4 pb-12 mt-8">
      <h3 className="font-display text-xl font-extrabold mb-4" style={{ color: C.charcoal }}>Dúvidas rápidas</h3>
      <div className="space-y-2">
        {FAQS.map(([q,a], i) => (
          <div key={i} className="rounded-2xl overflow-hidden" style={{ backgroundColor: C.card, border: `1px solid ${C.border}` }}>
            <button onClick={() => setOpen(open===i ? null : i)}
              className="w-full flex justify-between items-center px-4 py-3 text-left">
              <span className="font-semibold text-sm" style={{ color: C.charcoal }}>{q}</span>
              <span style={{ color: C.muted }}>{open===i ? '∧' : '∨'}</span>
            </button>
            {open===i && (
              <div className="px-4 pb-3 text-sm fade-up" style={{ color: C.muted }}>{a}</div>
            )}
          </div>
        ))}
      </div>
      <p className="text-center text-xs mt-8" style={{ color: C.muted }}>Disponibilidade em tempo real · Confirmação no WhatsApp</p>
    </div>
  );
}

// ── Main App ─────────────────────────────────────────────────────────────────
function ReservationApp() {
  const dates = React.useMemo(() => {
    const today = new Date(); today.setHours(0,0,0,0);
    return Array.from({length: DAYS_AHEAD}, (_,i) => { const d=new Date(today); d.setDate(today.getDate()+i); return d; });
  }, []);

  const [availability, setAvailability] = useState([]);
  const [selectedDate, setSelectedDate] = useState(null);
  const [selectedParty, setSelectedParty] = useState(null);
  const [selectedTime, setSelectedTime] = useState(null);
  const [notes, setNotes] = useState('');
  const [name, setName] = useState('');
  const [phone, setPhone] = useState('');
  const [email, setEmail] = useState('');
  const [openStep, setOpenStep] = useState('date');
  const [confirmation, setConfirmation] = useState(null);
  const [submitting, setSubmitting] = useState(false);
  const [error, setError] = useState('');

  useEffect(() => {
    if(!selectedDate) return;
    loadAvailability(selectedDate).then(setAvailability);
  }, [selectedDate]);

  const bookedAt = (time) => availability.filter(a => a.time===time).reduce((s,a)=>s+a.partySize,0);
  const remaining = (time) => CAPACITY_PER_SLOT - bookedAt(time);

  function slotStatus(time) {
    const r = remaining(time);
    if(r<=0) return 'full';
    if(r <= CAPACITY_PER_SLOT*0.35) return 'few';
    return 'ok';
  }

  const DINNER_SLOTS = getDinnerSlots(selectedDate);
  const allSlots = [...LUNCH_SLOTS, ...DINNER_SLOTS];
  const availableSlots = allSlots.filter(t => slotStatus(t)!=='full');

  function handleConfirm() {
    if(!selectedDate||!selectedParty||!selectedTime) { setError('Preencha todos os campos.'); return; }
    if(!name.trim()||!phone.trim()) { setError('Preencha nome e telefone.'); return; }
    setError('');
    const reservation = {
      id: generateCode(), time: selectedTime, partySize: selectedParty,
      name: name.trim(), phone: phone.trim(), email: email.trim(), notes: notes.trim(),
    };
    window.open(buildWA(reservation, selectedDate), '_blank', 'noopener,noreferrer');
    setSubmitting(true);
    (async () => {
      await saveReservation(selectedDate, reservation);
      setConfirmation(reservation);
      setSubmitting(false);
    })();
  }

  function resetAll() {
    setSelectedDate(null); setSelectedParty(null); setSelectedTime(null);
    setNotes(''); setName(''); setPhone(''); setEmail('');
    setOpenStep('date'); setConfirmation(null); setError('');
  }

  return (
    <div>
      {/* Header */}
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',textAlign:'center',padding:'0 16px',marginTop:'32px',position:'relative',zIndex:10}}>
        <div style={{backgroundColor:C.card,border:`1px solid ${C.border}`,borderRadius:24,padding:12,boxShadow:'0 4px 12px rgba(0,0,0,0.1)',marginBottom:16,display:'inline-block'}}>
          <img src={LOGO_DATA_URI} alt="logo" style={{width:128,height:128,objectFit:'contain',borderRadius:16,display:'block'}} />
        </div>
        <div style={{display:'inline-flex',alignItems:'center',gap:8,backgroundColor:C.gold,borderRadius:999,padding:'8px 20px',marginBottom:20}}>
          <span>📅</span>
          <span style={{fontFamily:"'Baloo 2',sans-serif",fontSize:11,fontWeight:800,textTransform:'uppercase',letterSpacing:'0.08em',color:C.charcoal}}>{BADGE_TEXT}</span>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,width:'100%',maxWidth:360}}>
          {[['✅','Reserva grátis','sem taxa'],['⚡','Tempo real','mesas ao vivo'],['💬','Confirmação','no WhatsApp']].map(([icon,title,sub]) => (
            <div key={title} style={{backgroundColor:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:12,textAlign:'center'}}>
              <div style={{fontSize:20,marginBottom:4}}>{icon}</div>
              <p style={{fontWeight:600,fontSize:12,color:C.charcoal,marginBottom:2}}>{title}</p>
              <p style={{fontSize:11,color:C.muted}}>{sub}</p>
            </div>
          ))}
        </div>
      </div>

      {/* Main form or ticket */}
      <div className="max-w-lg mx-auto px-4 mt-6">
        {confirmation ? (
          <Ticket reservation={confirmation} date={selectedDate} onReset={resetAll} />
        ) : (
          <div>
            {/* Info banner */}
            <div className="rounded-2xl px-4 py-3 mb-4 text-sm" style={{ backgroundColor: C.bannerBg, color: C.bannerText }}>
              {INFO_BANNER_TEXT}
            </div>

            {/* Steps card */}
            <div className="rounded-2xl overflow-hidden" style={{ backgroundColor: C.card, border:`1px solid ${C.border}` }}>

              {/* Step 1: Date */}
              <Step number={1} icon="📅" label="Data" open={openStep==='date'}
                onToggle={()=>setOpenStep(openStep==='date'?null:'date')}
                valueLabel={selectedDate ? formatLong(selectedDate) : null}>
                <div className="space-y-1 max-h-56 overflow-y-auto pr-1">
                  {dates.map((d,i) => (
                    <button key={i} onClick={()=>{setSelectedDate(d);setSelectedTime(null);setSelectedParty(null);setOpenStep('party');}}
                      className="w-full text-left px-3 py-2.5 rounded-xl text-sm font-semibold transition-colors"
                      style={{ backgroundColor: selectedDate&&dateKey(d)===dateKey(selectedDate) ? C.red : 'transparent',
                        color: selectedDate&&dateKey(d)===dateKey(selectedDate) ? '#fff' : C.charcoal }}>
                      {i===0 ? `Hoje — ${formatLong(d)}` : formatLong(d)}
                    </button>
                  ))}
                </div>
              </Step>

              {/* Step 2: Party */}
              <Step number={2} icon="👥" label="Pessoas" open={openStep==='party'}
                onToggle={()=>setOpenStep(openStep==='party'?null:'party')}
                disabled={!selectedDate}
                valueLabel={selectedParty ? `${selectedParty} ${selectedParty===1?'pessoa':'pessoas'}` : null}>
                <div className="grid grid-cols-5 gap-2">
                  {Array.from({length:10},(_,i)=>i+1).map(n => (
                    <button key={n} onClick={()=>{setSelectedParty(n);setOpenStep('time');}}
                      className="rounded-xl py-2.5 text-sm font-bold"
                      style={{ backgroundColor: selectedParty===n ? C.red : '#F0EBE3',
                        color: selectedParty===n ? '#fff' : C.charcoal }}>
                      {n}
                    </button>
                  ))}
                </div>
              </Step>

              {/* Step 3: Time */}
              <Step number={3} icon="🕐" label="Horário" open={openStep==='time'}
                onToggle={()=>setOpenStep(openStep==='time'?null:'time')}
                disabled={!selectedDate||!selectedParty}
                valueLabel={selectedTime || null}>
                {['Almoço','Jantar'].filter((_,li) => li===0 || getDinnerSlots(selectedDate).length > 0).map((label, li) => {
                  const slots = li===0 ? LUNCH_SLOTS : getDinnerSlots(selectedDate);
                  return (
                    <div key={label} className="mb-3">
                      <p className="text-xs font-bold uppercase tracking-wider mb-2" style={{ color: C.muted }}>{label}</p>
                      <div className="grid grid-cols-3 gap-2">
                        {slots.map(t => {
                          const status = slotStatus(t);
                          const isFull = status==='full';
                          const isSelected = selectedTime===t;
                          const rem = remaining(t);
                          return (
                            <button key={t} disabled={isFull} onClick={()=>{setSelectedTime(t);setOpenStep(null);}}
                              className="rounded-xl py-2.5 flex flex-col items-center gap-0.5 disabled:opacity-40"
                              style={{ backgroundColor: isSelected?C.red:isFull?'#F0EBE3':'#F0EBE3',
                                color: isSelected?'#fff':C.charcoal, border:`1px solid ${isSelected?C.red:C.border}` }}>
                              <span className="font-display text-sm font-bold">{t}</span>
                              <span className="text-xs" style={{ color: isSelected?'rgba(255,255,255,0.8)':status==='few'?C.gold:status==='full'?C.red:C.muted }}>
                                {isFull?'Esgotado':status==='few'?`${rem} vagas`:'Disponível'}
                              </span>
                            </button>
                          );
                        })}
                        </div>
                    </div>
                  );
                })}
                </Step>

              {/* Contact fields */}
              <div className="px-5 pb-4 pt-2 space-y-2" style={{ borderTop:`1px solid ${C.border}` }}>
                <p className="text-xs font-bold uppercase tracking-widest pt-2" style={{ color: C.muted }}>Seus dados</p>
                {[
                  [name, setName, 'Nome completo', 'text'],
                  [phone, setPhone, 'Telefone', 'tel'],
                  [email, setEmail, 'E-mail (opcional)', 'email'],
                ].map(([val,set,placeholder,type]) => (
                  <input key={placeholder} type={type} value={val} onChange={e=>set(e.target.value)}
                    placeholder={placeholder}
                    className="w-full rounded-xl px-4 py-3 text-sm outline-none"
                    style={{ backgroundColor:'#F7F2EA', border:`1px solid ${C.border}`, color: C.charcoal }} />
                ))}
                <textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={2}
                  placeholder="Alguma observação? (opcional) — Ex.: Aniversário, alergia, cadeirinha de bebê..."
                  className="w-full rounded-xl px-4 py-3 text-sm outline-none resize-none"
                  style={{ backgroundColor:'#F7F2EA', border:`1px solid ${C.border}`, color: C.charcoal }} />
              </div>
            </div>

            {error && <p className="text-sm rounded-2xl px-4 py-3 mt-3" style={{ backgroundColor:'#FCEAE7', color:C.redDark, border:`1px solid ${C.red}` }}>{error}</p>}

            <button onClick={handleConfirm} disabled={submitting}
              className="w-full rounded-full py-4 mt-4 font-display text-base font-extrabold uppercase tracking-wide disabled:opacity-60"
              style={{ backgroundColor: C.red, color:'#fff' }}>
              {submitting ? 'Confirmando...' : 'Confirmar reserva'}
            </button>
            <p className="text-center text-xs mt-3 pb-2" style={{ color: C.muted }}>Disponibilidade em tempo real · Confirmação no WhatsApp</p>
          </div>
          )
        }
      </div>

      {!confirmation && <FAQ />}
    </div>
  );
}

function AppWrapper() {
  return (
    <div style={{minHeight:'100vh', backgroundColor:'#FBF5EA'}}>
      <ReservationApp />
    </div>
  );
}
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<AppWrapper />);
</script>
</body>
</html>
